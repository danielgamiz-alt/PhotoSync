name: Release Android APK

# Builds and signs the PhotoSync APK on GitHub's runners whenever you push a
# version tag (e.g. v0.2.0), then attaches it to a GitHub Release. No local
# Android Studio build needed.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64    - base64 of android/photosync-release.jks
#   KEYSTORE_PASSWORD  - the keystore (store) password
#   KEY_ALIAS          - the key alias (e.g. photosync)
#   KEY_PASSWORD       - the key password
# See RELEASING.md for how to produce these.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Version name from tag
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore signing keystore
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > photosync-release.jks
          {
            echo "storeFile=photosync-release.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -PversionNameOverride="${{ steps.ver.outputs.name }}" \
            -PversionCodeOverride="${{ github.run_number }}"

      - name: Name the APK after the tag
        run: cp android/app/build/outputs/apk/release/app-release.apk "PhotoSync-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PhotoSync-${{ github.ref_name }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Clean up secrets from the workspace
        if: always()
        working-directory: android
        run: rm -f photosync-release.jks keystore.properties
