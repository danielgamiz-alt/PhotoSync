name: Release (Android app + Windows server)

# On a version tag (e.g. v0.2.0) this builds two downloads and attaches both to
# one GitHub Release — no local builds needed:
#   - the signed PhotoSync Android APK            (build job)
#   - the portable PhotoSync Server for Windows   (windows-server job)
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64    - base64 of android/photosync-release.jks
#   KEYSTORE_PASSWORD  - the keystore (store) password
#   KEY_ALIAS          - the key alias (e.g. photosync)
#   KEY_PASSWORD       - the key password
# See RELEASING.md for how to produce these.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history + tags, so the changelog step can diff against the previous tag

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Version name from tag
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore signing keystore
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > photosync-release.jks
          {
            echo "storeFile=photosync-release.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -PversionNameOverride="${{ steps.ver.outputs.name }}" \
            -PversionCodeOverride="${{ github.run_number }}"

      - name: Name the APK after the tag
        # Two copies: a version-named one (clear in the releases list) and a
        # fixed-named PhotoSync.apk so the landing page can link straight to
        #   …/releases/latest/download/PhotoSync.apk
        # — a stable one-tap download that never changes between versions.
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "PhotoSync-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "PhotoSync.apk"

      - name: Generate latest.json (in-app update check)
        # The phone app fetches …/releases/latest/download/latest.json to learn
        # the newest version, where to get it, and a short "what's new" list.
        # versionCode matches the APK build (github.run_number) so the app can
        # compare it against its own BuildConfig.VERSION_CODE.
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then RANGE="${PREV}..${GITHUB_REF_NAME}"; else RANGE="${GITHUB_REF_NAME}"; fi
          # Commit subjects since the previous tag → a human "what's new" list,
          # dropping internal/noise commits and capping the length. The trailing
          # "|| true" keeps a no-match grep / SIGPIPE from failing the step under
          # the runner's pipefail.
          NOTES_JSON=$( (git log --no-merges --pretty=format:'%s' $RANGE \
            | grep -viE '^(chore|ci|build|test|refactor|docs\(internal\)):' \
            | sed -E 's/^[a-z]+(\([^)]*\))?: //' \
            | head -n 10 \
            | jq -R . | jq -s .) || true )
          if [ -z "$NOTES_JSON" ] || [ "$NOTES_JSON" = "null" ]; then NOTES_JSON='[]'; fi
          REPO_URL="https://github.com/${{ github.repository }}"
          jq -n \
            --argjson appcode "${{ github.run_number }}" \
            --arg ver "${{ steps.ver.outputs.name }}" \
            --arg apk "${REPO_URL}/releases/latest/download/PhotoSync.apk" \
            --arg site "https://danielgamiz-alt.github.io/PhotoServer/" \
            --arg notes "${REPO_URL}/releases/latest" \
            --argjson list "$NOTES_JSON" \
            '{app:{versionCode:$appcode,versionName:$ver,url:$apk,notesUrl:$notes,notes:$list},
              server:{versionName:$ver,url:$site,notesUrl:$notes,notes:$list}}' > latest.json
          cat latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PhotoSync-${{ github.ref_name }}.apk
            PhotoSync.apk
            latest.json
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Clean up secrets from the workspace
        if: always()
        working-directory: android
        run: rm -f photosync-release.jks keystore.properties

  # The Windows server download: builds the portable folder (bundled Node +
  # PhotoSync Server.exe launcher), zips it, and attaches it to the same Release.
  # No secrets needed — the server isn't signed (users get a one-time
  # SmartScreen "Run anyway", same as the APK's Play Protect prompt).
  windows-server:
    runs-on: windows-latest
    needs: build            # attach to the Release the build job creates
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Stamp version from tag
        run: node scripts/stamp-version.js "${{ steps.ver.outputs.name }}"

      - name: Build portable server (folder + zip)
        working-directory: desktop
        run: npm run package

      - name: Name the zip after the tag
        # Version-named + fixed-named copy, same as the APK, so the landing page
        # can link straight to …/releases/latest/download/PhotoSync-Server-Windows.zip
        shell: pwsh
        run: |
          Copy-Item "desktop/dist/PhotoSync Server-Windows.zip" "PhotoSync-Server-Windows-${{ github.ref_name }}.zip"
          Copy-Item "desktop/dist/PhotoSync Server-Windows.zip" "PhotoSync-Server-Windows.zip"

      - name: Attach to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PhotoSync-Server-Windows-${{ github.ref_name }}.zip
            PhotoSync-Server-Windows.zip
          fail_on_unmatched_files: true
